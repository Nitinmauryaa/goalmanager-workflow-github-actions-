name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      smoke_target:
        description: "Select smoke tests to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - flask
          - fastapi

jobs:
  lint-and-syntax:
    name: Lint and Syntax Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m compileall backend

      - name: Frontend file sanity check
        run: |
          test -f frontend/index.html
          test -f frontend/app.js
          test -f frontend/styles.css

  flask-smoke-test:
    name: Flask API Smoke Test
    runs-on: ubuntu-latest
    needs: lint-and-syntax
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.smoke_target == 'all' || github.event.inputs.smoke_target == 'flask'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask app
        run: |
          python backend/flask_app/app.py > flask.log 2>&1 &
          echo $! > flask.pid

      - name: Wait for Flask to become ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/api/goals > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Flask did not start in time"
          cat flask.log
          exit 1

      - name: Smoke test Flask API
        run: |
          python - <<'PY'
          import json
          import urllib.request

          def req(method, url, data=None):
            body = None
            headers = {}
            if data is not None:
              body = json.dumps(data).encode("utf-8")
              headers["Content-Type"] = "application/json"
            r = urllib.request.Request(url, data=body, method=method, headers=headers)
            with urllib.request.urlopen(r, timeout=10) as resp:
              return resp.status, json.loads(resp.read().decode("utf-8"))

          status, goals = req("GET", "http://127.0.0.1:5000/api/goals")
          assert status == 200, status
          assert isinstance(goals, list), type(goals)

          status, created = req(
            "POST",
            "http://127.0.0.1:5000/api/goals",
            {
              "title": "CI test goal",
              "description": "created by github actions",
              "target_date": "2026-03-30"
            },
          )
          assert status == 201, status
          assert created["title"] == "CI test goal", created
          print("Flask smoke test passed")
          PY

      - name: Stop Flask app
        if: always()
        run: |
          kill "$(cat flask.pid)" || true

  fastapi-smoke-test:
    name: FastAPI API Smoke Test
    runs-on: ubuntu-latest
    needs: lint-and-syntax
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.smoke_target == 'all' || github.event.inputs.smoke_target == 'fastapi'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start FastAPI app
        run: |
          uvicorn backend.fastapi_app.main:app --host 127.0.0.1 --port 8000 > fastapi.log 2>&1 &
          echo $! > fastapi.pid

      - name: Wait for FastAPI to become ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/goals > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "FastAPI did not start in time"
          cat fastapi.log
          exit 1

      - name: Smoke test FastAPI API
        run: |
          python - <<'PY'
          import json
          import urllib.request

          def req(method, url, data=None):
            body = None
            headers = {}
            if data is not None:
              body = json.dumps(data).encode("utf-8")
              headers["Content-Type"] = "application/json"
            r = urllib.request.Request(url, data=body, method=method, headers=headers)
            with urllib.request.urlopen(r, timeout=10) as resp:
              return resp.status, json.loads(resp.read().decode("utf-8"))

          status, goals = req("GET", "http://127.0.0.1:8000/api/goals")
          assert status == 200, status
          assert isinstance(goals, list), type(goals)

          status, created = req(
            "POST",
            "http://127.0.0.1:8000/api/goals",
            {
              "title": "CI test goal",
              "description": "created by github actions",
              "target_date": "2026-03-30"
            },
          )
          assert status == 201, status
          assert created["title"] == "CI test goal", created
          print("FastAPI smoke test passed")
          PY

      - name: Stop FastAPI app
        if: always()
        run: |
          kill "$(cat fastapi.pid)" || true
